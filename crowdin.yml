# Crowdin 配置
# 项目设置参考：https://support.crowdin.com/configuration-file/

# 项目 ID 和 API Token（需要替换为实际值）
"project_id": "882742"
"base_path": "."
"preserve_hierarchy": true

# 文件配置
files:
  # UI 界面语言文件 (JSON)
  - source: "/src/i18n/locales/en.json"
    translation: "/src/i18n/locales/%locale%.json"
    type: json
    languages_mapping:
      locale:
        de: de-DE
        en: en
        fr: fr-FR
        it: it-IT
        ja: ja-JP
        ko: ko-KR
        nl: nl-NL
        ru: ru-RU
        zh-CN: zh-CN
        zh-TW: zh-TW

  # 托盘菜单语言文件 (TOML)
  - source: "/src-tauri/locales/en.toml"
    translation: "/src-tauri/locales/%locale%.toml"
    type: toml
    languages_mapping:
      locale:
        de: de-DE
        en: en
        fr: fr-FR
        it: it-IT
        ja: ja-JP
        ko: ko-KR
        nl: nl-NL
        ru: ru-RU
        zh-CN: zh-CN
        zh-TW: zh-TW
