<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>smtc2web</title>
    <script src="lib/vue.global.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- 导航栏 -->
      <nav class="navbar">
        <div class="navbar-brand">smtc2web</div>
        <div class="navbar-tabs">
          <button 
            class="nav-tab" 
            :class="{ active: currentView === 'themes' }"
            @click="currentView = 'themes'"
          >
            主题
          </button>
          <button 
            class="nav-tab" 
            :class="{ active: currentView === 'settings' }"
            @click="currentView = 'settings'"
          >
            设置
          </button>
        </div>
      </nav>

      <!-- 主题页面 -->
      <div v-if="currentView === 'themes'" class="page">
        <div class="page-header">
          <h2>主题列表</h2>
          <button 
            class="btn btn-primary" 
            @click="uploadTheme"
            :disabled="uploadLoading"
          >
            <span v-if="uploadLoading">上传中...</span>
            <span v-else>+ 上传主题</span>
          </button>
        </div>
        
        <div v-if="themesLoading" class="loading">加载中...</div>
        
        <div v-else-if="themes.length === 0" class="empty-state">
          <p>暂无主题</p>
          <p class="hint">点击"上传主题"按钮添加新主题</p>
        </div>
        
        <div v-else class="themes-grid">
          <div
            v-for="theme in themes"
            :key="theme.folder_name"
            class="theme-card"
            :class="{ active: theme.folder_name === currentTheme }"
            @click="selectTheme(theme)"
          >
            <div class="theme-preview">
              <img 
                v-if="getScreenshotUrl(theme.screenshot_path)"
                :src="getScreenshotUrl(theme.screenshot_path)"
                :alt="theme.name"
              />
              <div v-else class="preview-placeholder">
                <span>无预览图</span>
              </div>
              <div 
                v-if="theme.folder_name === currentTheme" 
                class="active-badge"
              >
                <span class="badge-dot"></span>
                <span>当前使用中</span>
              </div>
              <div 
                v-if="theme.is_default" 
                class="default-badge"
              >
                <span>默认</span>
              </div>
            </div>
            <div class="theme-info">
              <h3 class="theme-name">{{ theme.name }}</h3>
              <div class="theme-meta">
                <span class="theme-author">{{ theme.author }}</span>
                <span class="theme-version">{{ theme.version }}</span>
              </div>
            </div>
            <button 
              v-if="theme.folder_name !== currentTheme && !theme.is_default"
              class="delete-btn" 
              @click.stop="deleteTheme(theme)"
              title="删除主题"
            >
              ×
            </button>
          </div>
        </div>
      </div>

      <!-- 设置页面 -->
      <div v-else class="page">
        <h2>设置</h2>
        
        <div class="settings-form">
          <div class="form-group">
            <label>服务器端口</label>
            <input
              type="number"
              v-model.number="config.server_port"
              min="1"
              max="65535"
            />
          </div>
          
          <div class="form-group">
            <label>服务器地址</label>
            <input
              type="text"
              v-model="config.address"
              placeholder="127.0.0.1"
            />
          </div>
          
          <div class="form-group checkbox">
            <label>
              <input
                type="checkbox"
                v-model="config.show_console"
              />
              显示控制台
            </label>
            <p class="hint">重启应用后生效</p>
          </div>
          
          <div class="form-actions">
            <button 
              class="btn btn-primary" 
              @click="saveConfig"
              :disabled="configLoading"
            >
              <span v-if="configLoading">保存中...</span>
              <span v-else-if="configSaved">已保存 ✓</span>
              <span v-else>保存</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const { createApp, ref, reactive } = Vue
      
      createApp({
        setup() {
          const currentView = ref('themes')
          const currentTheme = ref('')
          const themes = ref([])
          const themesLoading = ref(false)
          const uploadLoading = ref(false)
          const config = reactive({
            server_port: 3030,
            address: '127.0.0.1',
            show_console: false
          })
          const configLoading = ref(false)
          const configSaved = ref(false)

          // 检查 Tauri API 是否可用
          const hasTauri = typeof window.__TAURI__ !== 'undefined'
          
          // 模拟数据（当 Tauri 不可用时）
          const mockThemes = [
            {
              name: '默认主题',
              folder_name: 'default',
              author: 'smtc2web',
              version: '1.0.0',
              screenshot_path: ''
            },
            {
              name: '深色主题',
              folder_name: 'dark',
              author: '用户',
              version: '2.0.0',
              screenshot_path: ''
            }
          ]

          // 加载主题列表
          const loadThemes = async () => {
            themesLoading.value = true
            try {
              if (hasTauri) {
                const { invoke } = window.__TAURI__.core
                themes.value = await invoke('get_themes')
              } else {
                // 开发模式下使用模拟数据
                themes.value = mockThemes
              }
            } catch (e) {
              console.error('加载主题失败:', e)
              themes.value = mockThemes
            } finally {
              themesLoading.value = false
            }
          }

          // 加载当前主题
          const loadCurrentTheme = async () => {
            try {
              if (hasTauri) {
                const { invoke } = window.__TAURI__.core
                currentTheme.value = await invoke('get_current_theme')
              } else {
                currentTheme.value = 'default'
              }
            } catch (e) {
              console.error('加载当前主题失败:', e)
            }
          }

          // 切换主题
          const selectTheme = async (theme) => {
            if (theme.folder_name === currentTheme.value) return
            
            try {
              if (hasTauri) {
                const { invoke } = window.__TAURI__.core
                await invoke('set_theme', { themeName: theme.folder_name })
                await loadCurrentTheme()
                alert('主题切换成功！')
              } else {
                currentTheme.value = theme.folder_name
                alert('主题切换成功！(模拟模式)')
              }
            } catch (e) {
              console.error('切换主题失败:', e)
              alert('切换主题失败: ' + e)
            }
          }

          // 删除主题
          const deleteTheme = async (theme) => {
            if (!confirm(`确定要删除主题 "${theme.name}" 吗？`)) return
            
            try {
              if (hasTauri) {
                const { invoke } = window.__TAURI__.core
                await invoke('delete_theme', { themeFolder: theme.folder_name })
                await loadThemes()
              } else {
                themes.value = themes.value.filter(t => t.folder_name !== theme.folder_name)
              }
            } catch (e) {
              console.error('删除主题失败:', e)
              alert('删除主题失败: ' + e)
            }
          }

          // 上传主题
          const uploadTheme = async () => {
            try {
              if (hasTauri) {
                const { invoke } = window.__TAURI__.core
                
                // 使用 input file 元素代替 dialog API
                const input = document.createElement('input')
                input.type = 'file'
                input.accept = '.zip'
                
                input.onchange = async (e) => {
                  const file = e.target.files[0]
                  if (!file) return
                  
                  // 验证文件类型
                  if (!file.name.endsWith('.zip')) {
                    alert('请选择 ZIP 格式的主题文件')
                    return
                  }
                  
                  uploadLoading.value = true
                  try {
                    console.log('开始上传主题:', file.name)
                    
                    // 读取文件为 ArrayBuffer
                    const arrayBuffer = await file.arrayBuffer()
                    const uint8Array = new Uint8Array(arrayBuffer)
                    
                    // 调用后端命令，传递文件名和文件内容
                    const themeName = await invoke('upload_theme_from_bytes', { 
                      fileName: file.name,
                      fileData: Array.from(uint8Array)
                    })
                    
                    console.log('主题上传成功:', themeName)
                    
                    // 等待一小段时间确保文件系统已更新
                    await new Promise(resolve => setTimeout(resolve, 500))
                    
                    // 刷新主题列表
                    await loadThemes()
                    
                    // 显示成功消息
                    alert(`主题 "${themeName}" 上传成功！`)
                  } catch (e) {
                    console.error('上传主题失败:', e)
                    alert('上传主题失败: ' + (e.message || e))
                  } finally {
                    uploadLoading.value = false
                  }
                }
                
                input.click()
              } else {
                alert('上传功能需要 Tauri 环境')
              }
            } catch (e) {
              console.error('上传主题失败:', e)
              alert('上传主题失败: ' + e)
            }
          }

          // 获取截图 URL
          const getScreenshotUrl = (path) => {
            // path 现在统一为 Base64 data URI 或空字符串
            return path && path.startsWith('data:') ? path : null
          }

          // 加载配置
          const loadConfig = async () => {
            try {
              if (hasTauri) {
                const { invoke } = window.__TAURI__.core
                const data = await invoke('get_config')
                Object.assign(config, data)
              }
            } catch (e) {
              console.error('加载配置失败:', e)
            }
          }

          // 保存配置
          const saveConfig = async () => {
            configLoading.value = true
            configSaved.value = false
            
            try {
              if (hasTauri) {
                const { invoke } = window.__TAURI__.core
                await invoke('save_config', { configDto: config })
                configSaved.value = true
                setTimeout(() => configSaved.value = false, 2000)
              } else {
                configSaved.value = true
                setTimeout(() => configSaved.value = false, 2000)
              }
            } catch (e) {
              console.error('保存配置失败:', e)
              alert('保存配置失败: ' + e)
            } finally {
              configLoading.value = false
            }
          }

          // 初始加载
          loadThemes()
          loadCurrentTheme()
          loadConfig()

          return {
            currentView,
            currentTheme,
            themes,
            themesLoading,
            uploadLoading,
            config,
            configLoading,
            configSaved,
            selectTheme,
            deleteTheme,
            uploadTheme,
            getScreenshotUrl,
            saveConfig
          }
        }
      }).mount('#app')
    </script>
  </body>
</html>
