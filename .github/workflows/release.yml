name: "Release"

on:
  workflow_dispatch:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
          - platform: "windows-latest"
            target: "aarch64-pc-windows-msvc"
          - platform: "ubuntu-latest"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-latest"
            target: "aarch64-unknown-linux-gnu"
          # - platform: "ubuntu-latest"
          #   target: "riscv64gc-unknown-linux-gnu"
          # - platform: "ubuntu-latest"
          #   target: "loongarch64-unknown-linux-gnu"

    runs-on: ${{ matrix.platform }}
    outputs:
      build-target: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: install dependencies (ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo dpkg --add-architecture arm64
            sudo apt update
            sudo apt install gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            sudo apt install libwebkit2gtk-4.1-dev:arm64 \
              libssl-dev:arm64 \
              libayatana-appindicator3-dev:arm64 \
              librsvg2-dev:arm64 \
              libxdo-dev:arm64
          fi

      - name: setup volta
        uses: volta-cli/action@v5.0.0
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install target
        run: rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        run: pnpm install

      - name: build frontend
        run: pnpm build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          OFFICIAL_UPDATE_URL: ${{ secrets.OFFICIAL_UPDATE_URL }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: 1
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      # Save the per-platform latest.json as an artifact for verification / debugging
      - name: find and upload per-platform latest.json
        if: always()
        shell: bash
        run: |
          # Tauri v2 generates latest.json in the bundle output directory.
          # The exact path may vary; search for it.
          MANIFEST=$(find src-tauri/target -name 'latest.json' -path '*/bundle/*' 2>/dev/null | head -1)
          if [ -z "$MANIFEST" ]; then
            MANIFEST=$(find src-tauri/target -name 'latest.json' 2>/dev/null | head -1)
          fi
          if [ -n "$MANIFEST" ]; then
            mkdir -p artifacts
            cp "$MANIFEST" "artifacts/latest-${{ matrix.target }}.json"
            echo "Found manifest at: $MANIFEST"
          else
            echo "::warning::latest.json not found in build output"
          fi
      - name: upload per-platform manifest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latest-json-${{ matrix.target }}
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 7

  # Merge per-platform latest.json artifacts into a single latest.json and
  # upload it to the release. This runs after all parallel build jobs finish,
  # so each build job can produce its own manifest without conflicts.
  merge-latest-json:
    name: Merge latest.json
    runs-on: ubuntu-latest
    needs: publish-tauri
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install tauri-cli
        run: cargo install tauri-cli --version "^2"

      - name: download per-platform manifests
        uses: actions/download-artifact@v4
        with:
          pattern: latest-json-*
          merge-multiple: true
          path: manifests

      - name: merge platforms into one latest.json
        run: |
          python3 << 'PYEOF'
          import json, glob

          merged = {"version": "", "notes": "", "pub_date": "", "platforms": {}}
          for f in sorted(glob.glob("manifests/latest-*.json")):
              with open(f) as fh:
                  data = json.load(fh)
              if not merged["version"]:
                  merged["version"] = data.get("version", "")
                  merged["notes"] = data.get("notes", "")
                  merged["pub_date"] = data.get("pub_date", "")
              merged["platforms"].update(data.get("platforms", {}))

          with open("merged.json", "w") as fh:
              json.dump(merged, fh, indent=2)

          print(f"Merged {len(merged['platforms'])} platforms")
          PYEOF

      - name: sign merged latest.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          cargo tauri signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            merged.json
          mv merged.json latest.json

      - name: upload merged latest.json to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" latest.json --clobber

  upload-to-r2:
    name: Upload to Cloudflare R2
    runs-on: ubuntu-latest
    needs: merge-latest-json
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all release assets (including latest.json)
        uses: robinraju/release-downloader@v1.13
        with:
          tag: ${{ github.ref_name }}
          fileName: "*"
          out-file-path: "artifacts"

      - name: Rewrite latest.json URLs for R2
        run: |
          python3 << 'PYEOF'
          import json, os
          R2_PUBLIC = os.environ["R2_PUBLIC_URL"]

          with open("artifacts/latest.json") as f:
              manifest = json.load(f)

          for platform, entry in manifest.get("platforms", {}).items():
              old_url = entry.get("url", "")
              filename = old_url.rsplit("/", 1)[-1]
              entry["url"] = f"{R2_PUBLIC}/{filename}"
              print(f"  {platform}: {filename}")

          with open("artifacts/latest.json", "w") as f:
              json.dump(manifest, f, indent=2)

          print("latest.json URLs rewritten to R2")
          PYEOF
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Upload files to Cloudflare R2
        run: |
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set region auto

          ENDPOINT="${{ secrets.R2_ENDPOINT }}"
          BUCKET="${{ secrets.R2_BUCKET_NAME }}"

          for f in artifacts/*; do
            if [ -f "$f" ]; then
              filename=$(basename "$f")
              echo "Uploading: $filename"

              # latest.json 需要设置正确的 Content-Type
              if [ "$filename" = "latest.json" ]; then
                aws s3 cp "$f" "s3://${BUCKET}/latest.json" \
                  --endpoint-url "${ENDPOINT}" \
                  --content-type application/json \
                  --no-progress
              else
                aws s3 cp "$f" "s3://${BUCKET}/${filename}" \
                  --endpoint-url "${ENDPOINT}" \
                  --no-progress
              fi
            fi
          done

          echo "All files uploaded to R2 successfully!"
          echo "latest.json URL: https://YOUR_R2_PUBLIC_DOMAIN/latest.json"
