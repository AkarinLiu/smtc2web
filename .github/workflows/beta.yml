name: "Beta"

on:
  workflow_dispatch:
  push:
    tags:
      - v*.*.*-beta*

permissions:
  contents: read

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # max-parallel: 1 ensures sequential builds so that latest.json
      # is correctly merged across platforms without race conditions.
      max-parallel: 1
      matrix:
        include:
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
          - platform: "windows-latest"
            target: "aarch64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup volta
        uses: volta-cli/action@v5.0.0
        with:
          node-version: 24

      - name: install pnpm
        run: volta install pnpm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable # Set this to dtolnay/rust-toolchain@nightly

      - name: install aarch64 target
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: rustup target add aarch64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        # If you don't have `beforeBuildCommand` configured you may want to build your frontend here too.
        run: pnpm install # change this to npm or pnpm depending on which one you use.

      - name: build frontend
        run: pnpm build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          OFFICIAL_UPDATE_URL: ${{ secrets.OFFICIAL_UPDATE_URL }}
        with:
          tagName: v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: "v__VERSION__"
          releaseBody: "请访问 [Changelog.md](https://github.com/AkarinLiu/smtc2web/blob/v__VERSION__/Changelog.md) 查看版本变更信息。"
          releaseDraft: true
          prerelease: true
          args: --target ${{ matrix.target }}

      # Save the per-platform latest.json as an artifact for verification / debugging
      - name: find and upload per-platform latest.json
        if: always()
        run: |
          MANIFEST=$(find src-tauri/target -name 'latest.json' -path '*/bundle/*' 2>/dev/null | head -1)
          if [ -z "$MANIFEST" ]; then
            MANIFEST=$(find src-tauri/target -name 'latest.json' 2>/dev/null | head -1)
          fi
          if [ -n "$MANIFEST" ]; then
            mkdir -p artifacts
            cp "$MANIFEST" "artifacts/latest-${{ matrix.target }}.json"
            echo "Found manifest at: $MANIFEST"
          else
            echo "::warning::latest.json not found in build output"
          fi
      - name: upload per-platform manifest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latest-json-${{ matrix.target }}
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 7

  # Verify that latest.json on the release contains all expected platforms.
  verify-latest-json:
    name: Verify latest.json completeness
    runs-on: ubuntu-latest
    needs: publish-tauri
    steps:
      - name: Download merged latest.json from release
        uses: robinraju/release-downloader@v1.13
        with:
          tag: ${{ github.ref_name }}
          fileName: "latest.json"
          out-file-path: "merged"

      - name: Check platform coverage
        run: |
          python3 << 'PYEOF'
          import json, sys

          with open("merged/latest.json") as f:
              manifest = json.load(f)

          platforms = manifest.get("platforms", {})
          # Beta currently only ships Windows binaries
          expected = [
              "windows-x86_64",
              "windows-aarch64",
          ]

          missing = [p for p in expected if p not in platforms]

          print(f"Found {len(platforms)} platforms in latest.json:")
          for p in sorted(platforms.keys()):
              info = platforms[p]
              url = info.get("url", "N/A")
              print(f"  - {p}: {url}")

          if missing:
              print(f"\n::error::Missing platforms: {missing}")
              sys.exit(1)

          print("\nAll expected platforms present!")
          PYEOF

  upload-to-r2:
    name: Upload Beta to Cloudflare R2
    runs-on: ubuntu-latest
    needs: verify-latest-json
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all release assets
        uses: robinraju/release-downloader@v1.13
        with:
          tag: ${{ github.ref_name }}
          fileName: "*"
          out-file-path: "artifacts"

      - name: Rewrite latest.json URLs for R2
        run: |
          python3 << 'PYEOF'
          import json, os
          R2_PUBLIC = os.environ["R2_PUBLIC_URL"]

          manifest_path = "artifacts/latest.json"
          with open(manifest_path) as f:
              manifest = json.load(f)

          for platform, entry in manifest.get("platforms", {}).items():
              old_url = entry.get("url", "")
              filename = old_url.rsplit("/", 1)[-1]
              entry["url"] = f"{R2_PUBLIC}/{filename}"
              print(f"  {platform}: {filename}")

          with open(manifest_path, "w") as f:
              json.dump(manifest, f, indent=2)

          print("latest.json URLs rewritten to R2")
          PYEOF
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Upload files to Cloudflare R2
        run: |
          pip install awscli
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set region auto

          ENDPOINT="${{ secrets.R2_ENDPOINT }}"
          BUCKET="${{ secrets.R2_BUCKET_NAME }}"

          for f in artifacts/*; do
            if [ -f "$f" ]; then
              filename=$(basename "$f")
              echo "Uploading: $filename"

              if [ "$filename" = "latest.json" ]; then
                aws s3 cp "$f" "s3://${BUCKET}/latest-beta.json" \
                  --endpoint-url "${ENDPOINT}" \
                  --content-type application/json \
                  --no-progress
              else
                aws s3 cp "$f" "s3://${BUCKET}/${filename}" \
                  --endpoint-url "${ENDPOINT}" \
                  --no-progress
              fi
            fi
          done

          echo "Beta files uploaded to R2 successfully!"
