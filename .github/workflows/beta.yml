name: "Beta"

on:
  workflow_dispatch:
  push:
    tags:
      - v*.*.*-beta*

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
          - platform: "windows-latest"
            target: "aarch64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup volta
        uses: volta-cli/action@v4.2.1
        with:
          node-version: 24

      - name: install pnpm
        run: volta install pnpm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable # Set this to dtolnay/rust-toolchain@nightly

      - name: install aarch64 target
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: rustup target add aarch64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        # If you don't have `beforeBuildCommand` configured you may want to build your frontend here too.
        run: pnpm install # change this to npm or pnpm depending on which one you use.

      - name: build frontend
        run: pnpm build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          OFFICIAL_UPDATE_URL: ${{ secrets.OFFICIAL_UPDATE_URL }}
        with:
          tagName: v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: "v__VERSION__"
          releaseBody: "请访问 [Changelog.md](https://github.com/AkarinLiu/smtc2web/blob/v__VERSION__/Changelog.md) 查看版本变更信息。"
          releaseDraft: true
          prerelease: true
          args: --target ${{ matrix.target }}

  upload-to-r2:
    name: Upload Beta to Cloudflare R2
    runs-on: ubuntu-latest
    needs: publish-tauri
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all release assets
        uses: robinraju/release-downloader@v1.11
        with:
          tag: ${{ github.ref_name }}
          fileName: "*"
          out-file-path: "artifacts"

      - name: Rewrite latest.json URLs for R2
        run: |
          python3 << 'PYEOF'
          import json, os
          R2_PUBLIC = os.environ["R2_PUBLIC_URL"]

          manifest_path = "artifacts/latest.json"
          with open(manifest_path) as f:
              manifest = json.load(f)

          for platform, entry in manifest.get("platforms", {}).items():
              old_url = entry.get("url", "")
              filename = old_url.rsplit("/", 1)[-1]
              entry["url"] = f"{R2_PUBLIC}/{filename}"
              print(f"  {platform}: {filename}")

          with open(manifest_path, "w") as f:
              json.dump(manifest, f, indent=2)

          print("latest.json URLs rewritten to R2")
          PYEOF
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Upload files to Cloudflare R2
        run: |
          pip install awscli
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set region auto

          ENDPOINT="${{ secrets.R2_ENDPOINT }}"
          BUCKET="${{ secrets.R2_BUCKET_NAME }}"

          for f in artifacts/*; do
            if [ -f "$f" ]; then
              filename=$(basename "$f")
              echo "Uploading: $filename"

              if [ "$filename" = "latest.json" ]; then
                aws s3 cp "$f" "s3://${BUCKET}/latest-beta.json" \
                  --endpoint-url "${ENDPOINT}" \
                  --content-type application/json \
                  --no-progress
              else
                aws s3 cp "$f" "s3://${BUCKET}/${filename}" \
                  --endpoint-url "${ENDPOINT}" \
                  --no-progress
              fi
            fi
          done

          echo "Beta files uploaded to R2 successfully!"
