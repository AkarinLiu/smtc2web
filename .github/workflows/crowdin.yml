name: Crowdin Sync
on:
  schedule:
    - cron: "* 2/* * * *"
  paths:
    - "src/**"
    - "locales/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: nightly
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install dependencies
        run: pnpm install
      - name: Sync with Crowdin
        run: pnpm crowdin:upload && pnpm crowdin:download
      - uses: actions/push@v3
        with:
          ref: nightly
          token: ${{ secrets.GITHUB_TOKEN }}
